<h1>Internationalization Best Practices for Spec Dev</h1>
<section id="char-encoding">
<h2>Character encoding</h2>
<p>Specifications should require UTF-8 encoding for all content.</p>
</section>
<section id="language-tags">
<h2>Language tags</h2>
<p>Use BCP 47 language tags to identify the natural language of content.</p>
</section>
